<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KLYRO WEAR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.paypal.com/sdk/js?client-id=BAAyWNwYxMfha3164yNc22lJDC2aCZp8IV9je5tKbZeG6bFkSSDtOWqXkVUDIv5ZX7Ti50Numa051_q2dk&components=hosted-buttons&currency=SGD"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
background:#000;
color:#fff;
font-family:Arial, Helvetica, sans-serif;
overflow-x:hidden;
text-align:center;
}

/* INTRO */
#intro{
position:fixed;
width:100%;
height:100vh;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
animation:fadeOut 1s ease forwards;
animation-delay:2.5s;
}

#intro img{
width:180px;
opacity:0;
animation:logoReveal 1.5s ease forwards;
}

@keyframes logoReveal{
0%{opacity:0;transform:scale(.8);}
100%{opacity:1;transform:scale(1);}
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

/* HEADER */
header{
padding:80px 20px 40px;
}

header img{
width:120px;
margin-bottom:15px;
}

h1{
letter-spacing:4px;
font-size:28px;
}

.slogan{
opacity:.6;
margin-top:8px;
font-style:italic;
}

/* PRODUCT */
.product{
margin:60px 20px;
animation:fadeIn 1.5s ease;
}

.product img{
width:300px;
border-radius:10px;
box-shadow:0 0 40px rgba(255,255,255,.08);
transition:.4s;
}

.product img:hover{
transform:scale(1.05);
}

.price{
margin:15px 0;
font-size:18px;
opacity:.8;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

footer{
padding:40px 20px;
opacity:.4;
font-size:14px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<img src="IMG_5093.png">
</div>

<header>
<img src="IMG_5093.png">
<h1>KLYRO WEAR</h1>
<div class="slogan">If you want to quit, remember why you started.</div>
</header>

<div class="product">
<img src="https://images.unsplash.com/photo-1618354691373-d851c5c3a990?q=80&w=800&auto=format&fit=crop">
<h2>Black Grinding Hoodie</h2>
<div class="price">SGD $39.99</div>
<div id="paypal-button"></div>
</div>

<footer>
© 2026 KLYRO WEAR
</footer>

<script>
window.addEventListener("load", function() {
if (window.paypal) {
paypal.HostedButtons({
hostedButtonId: "jdmlp5t9"
}).render("#paypal-button");
}
});
</script>

</body>
</html>
